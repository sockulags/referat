name: Release build

# Verifiable CI build of the Windows installer (required for SignPath signing).
# Runs on version tags; the unsigned artifact is uploaded for signing/release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Local builds sign with the store-based cert (electron-builder.yml);
      # CI builds are unsigned — signing happens via SignPath after approval.
      # electron-builder 26 parses `-c.win.signtoolOptions=null` as a config
      # FILE path, so generate a config with the signing key stripped instead.
      - run: node -e "const fs=require('fs'),yaml=require('js-yaml');const c=yaml.load(fs.readFileSync('electron-builder.yml','utf8'));delete c.win.signtoolOptions;fs.writeFileSync('electron-builder.ci.yml',yaml.dump(c))"
      - run: npx electron-builder --win --publish never --config electron-builder.ci.yml
      - uses: actions/upload-artifact@v4
        with:
          name: referat-windows-setup
          path: |
            dist/*-setup.exe
            dist/*.blockmap
          if-no-files-found: error
