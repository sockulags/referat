appId: se.lucasskog.referat
productName: referat
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!site/*'
  - '!docs/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
# electron-updater reads its feed from app-update.yml, generated by
# electron-builder from this publish config; it also writes latest.yml +
# .blockmap next to the installer for the updater to consume.
publish:
  provider: github
  owner: sockulags
  repo: referat
win:
  executableName: referat
  icon: build/icon.ico
  # Self-signed cert in the CurrentUser store (public thumbprint, no secret).
  # Real SmartScreen trust requires a CA-issued cert — see wiki Roadmap.
  # publisherName is the expected Authenticode publisher for update verification;
  # matches the cert subject (CN=Lucas Skog) — see caveat in src/main/updater.ts.
  signtoolOptions:
    certificateSha1: 53873F00599680F4F610D0972683598ABBE84007
    rfc3161TimeStampServer: http://timestamp.digicert.com
    publisherName:
      - Lucas Skog
nsis:
  # Version-less artifact name so the site's /releases/latest/download/ link
  # never rots. The version lives in the release tag and latest.yml.
  artifactName: referat-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: true
  runAfterFinish: true
npmRebuild: false
