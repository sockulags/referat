appId: se.lucasskog.referat
productName: referat
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!site/*'
  - '!docs/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: referat
  icon: build/icon.ico
  # Self-signed cert in the CurrentUser store (public thumbprint, no secret).
  # Real SmartScreen trust requires a CA-issued cert — see wiki Roadmap.
  signtoolOptions:
    certificateSha1: 53873F00599680F4F610D0972683598ABBE84007
    rfc3161TimeStampServer: http://timestamp.digicert.com
nsis:
  artifactName: referat-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: true
  runAfterFinish: true
npmRebuild: false
